name = "wardest"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Non-secret config. Secrets (SESSION_SECRET, GOOGLE_CLIENT_ID/SECRET, RESEND_API_KEY) are set
# via `wrangler secret put` (prod) or `.dev.vars` (local). `.dev.vars` overrides these in dev.
[vars]
APP_URL = "https://app.wardest.com"
OPERATOR_EMAILS = ""  # owner task: set to operator Google email(s), comma-separated

# --- D1 (structured data; source of truth) ---
# Local dev keys storage by database_name and ignores database_id. Owner replaces the
# placeholder id with the real one after: wrangler d1 create wardest-db  (owner task O3).
[[d1_databases]]
binding = "DB"
database_name = "wardest-db"
database_id = "00000000-0000-0000-0000-000000000000"

# --- KV (go4.cc redirect mirror: slug -> destination URL) ---
# Owner replaces the placeholder id after: wrangler kv namespace create GO4_LINKS
[[kv_namespaces]]
binding = "GO4_LINKS"
id = "00000000000000000000000000000000"

# --- R2 (uploaded files/images for deliverables) ---
# Local dev auto-creates local state. Owner runs once for prod:
#   wrangler r2 bucket create wardest-files
[[r2_buckets]]
binding = "FILES"
bucket_name = "wardest-files"

